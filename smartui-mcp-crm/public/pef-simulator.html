<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MCP-CRM SmartUI — PEF Simulator</title>
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
    <script src="../node_modules/@softphone/cti-connector-jsdk/dist/softphone-connector-core.debug.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; background: #0a0f1e; font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; gap: 0; height: 100vh; overflow: hidden; }

        /* PEF widget (sinistra) */
        #pef-container {
            width: 380px; min-width: 380px; height: 100vh;
            border-right: 1px solid #334155;
            background: #1a2035;
            flex-shrink: 0;
        }

        /* Pannello debug (destra) */
        .debug-panel {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            background: #0f172a; color: #e2e8f0;
        }
        .debug-header {
            padding: 12px 16px; border-bottom: 1px solid #334155;
            background: #0c1524; display: flex; align-items: center; gap: 10px;
        }
        .debug-header h2 { margin: 0; font-size: 0.9rem; font-weight: 700; color: #e2e8f0; }
        .debug-header span { font-size: 0.7rem; color: #94a3b8; }

        .sim-strip {
            padding: 8px 14px; border-bottom: 1px solid #334155;
            background: #0c1524; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        }
        .sim-label { font-size: 0.62rem; color: #94a3b8; font-weight: 600;
            text-transform: uppercase; margin-right: 4px; }
        .sim-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #334155;
            background: #1e293b; color: #e2e8f0; font-size: 0.68rem;
            cursor: pointer; transition: background 0.12s;
        }
        .sim-btn:hover { background: #334155; border-color: #0ea5e9; }

        .log-area {
            flex: 1; overflow-y: auto; padding: 10px 14px;
            font-family: 'Consolas', monospace; font-size: 0.68rem;
        }
        .log-entry { margin-bottom: 3px; line-height: 1.5; }
        .log-entry.info  { color: #58a6ff; }
        .log-entry.suc   { color: #56d364; }
        .log-entry.warn  { color: #e3b341; }
        .log-entry.err   { color: #f85149; }
        .log-entry.api   { color: #c792ea; }
    </style>
</head>
<body>

<div id="pef-container"></div>

<div class="debug-panel">
    <div class="debug-header">
        <div style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#0ea5e9,#6366f1);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800">M</div>
        <h2>MCP-CRM SmartUI — Dev Simulator</h2>
        <span>Bundle: ../dist/smartui-mcp-crm.js</span>
    </div>

    <div class="sim-strip">
        <span class="sim-label">▶ Simula:</span>
        <button class="sim-btn" onclick="simEvent('voiceIn')">📞 Voice IN</button>
        <button class="sim-btn" onclick="simEvent('emailIn')">✉️ Email</button>
        <button class="sim-btn" onclick="simEvent('chatIn')">💬 Chat</button>
        <button class="sim-btn" onclick="simEvent('waIn')">📱 WhatsApp</button>
        <button class="sim-btn" onclick="simEvent('voiceOut')">📞 Voice OUT</button>
        <button class="sim-btn" style="border-color:#22c55e;color:#22c55e" onclick="simEnd()">✓ MarkDone</button>
    </div>

    <div class="log-area" id="logArea">
        <div class="log-entry info">[MCP-CRM Simulator] Pronto. Autenticati col widget Genesys e simulate un evento.</div>
    </div>
</div>

<script>
    // ── Configurazione PEF ───────────────────────────────────────
    const GENESYS_ENV = 'mypurecloud.com';
    log.setLogLevel(enumloglevel.debug);

    const pefParams = {
        customInteractionAttributes: [
            'context.email', 'context.name', 'email', 'emailaddress',
            'smartui_smartui-mcp-crm'
        ],
        settings: {
            hideWebRTCPopUpOption: false,
            enableCallLogs: false,
            dedicatedLoginWindow: false,
            embeddedInteractionWindow: false,
            enableConfigurableCallerId: false,
            enableServerSideLogging: false,
            enableCallHistory: false
        },
        clientIds: {
            'mypurecloud.com':    '6fa53f73-6ad4-473f-b492-c9cbae80be29',
            'mypurecloud.de':     '6fa53f73-6ad4-473f-b492-c9cbae80be29',
            'mypurecloud.ie':     '6fa53f73-6ad4-473f-b492-c9cbae80be29'
        },
        helpLinks: {}
    };

    const pefUrl = `https://apps.${GENESYS_ENV}/crm/softphoneHubspot/index.html` +
        `?request_configuration=true&full_PEF=true` +
        `&crm_domain=${window.location.origin}&language=it-IT`;

    const config = {
        context: window,
        layoutType: 'smart-ui',
        integrationType: 'pure-embeddable',
        url: pefUrl,
        auth: { environment: GENESYS_ENV },
        pefParams,
        smartUi: {
            mainJSpath: '../node_modules/@softphone/cti-connector-jsdk/dist/softphone-connector-smart-ui.debug.js',
            appendToElement: 'pef-container',
            showConnectionLed: true,
            globalViews: []      // nessuna globalView: la MCP-CRM è interaction view
        }
    };

    // ── Messaggi di test ─────────────────────────────────────────
    const EVENTS = {
        voiceIn:  { EVENT:'EventEstablished', MediaType:'voice', CallType:'Inbound',
            ANI:'+393349089191', DNIS:'+13172140816',
            InteractionID:'a1db7a49-b6e8-4f00-8958-6aa3bef294dc',
            ConnectionID:'a1db7a49-b6e8-4f00-8958-6aa3bef294dc', attachdata:{} },
        voiceOut: { EVENT:'EventDialing', MediaType:'voice', CallType:'Outbound',
            ANI:'+393349089191', DNIS:'+39026123456',
            InteractionID:'b2ec8b50-c9f9-5011-9069-7bb4cfg395ed',
            ConnectionID:'b2ec8b50-c9f9-5011-9069-7bb4cfg395ed', attachdata:{} },
        emailIn:  { EVENT:'EmailEventEstablished', MediaType:'email', CallType:'Inbound',
            ANI:'nicola.dirende@softphone.it', DNIS:'support@softphonecti.mypurecloud.com',
            InteractionID:'5441d66b-b9ce-42a1-ba9e-02ecbfee79d5',
            ConnectionID:'5441d66b-b9ce-42a1-ba9e-02ecbfee79d5', attachdata:{ email:'nicola.dirende@softphone.it' } },
        chatIn:   { EVENT:'WebmessagingEventEstablishedInbound', MediaType:'webmessaging', CallType:'Inbound',
            ANI:'', InteractionID:'41e4e0cb-14e9-4a03-a771-25c822bbf331',
            ConnectionID:'41e4e0cb-14e9-4a03-a771-25c822bbf331',
            attachdata:{ email:'mario.rossi@azienda.it', emailaddress:'mario.rossi@azienda.it' } },
        waIn:     { EVENT:'WhatsappEventEstablished', MediaType:'whatsapp', CallType:'Inbound',
            ANI:'393349089191', InteractionID:'821536ca-94e9-4b12-90e4-1f227855f3d0',
            ConnectionID:'821536ca-94e9-4b12-90e4-1f227855f3d0', attachdata:{} },
        end:      { EVENT:'EventMarkDone', MediaType:'voice', CallType:'Inbound',
            InteractionID:'a1db7a49-b6e8-4f00-8958-6aa3bef294dc', Duration:125, attachdata:{} }
    };

    let lastId = null;

    function addView(msg) {
        lastId = msg.InteractionID;
        const obj = {
            id: 'smartui-mcp-crm',
            classname: 'smartui-mcp-crm',
            title: 'MCP-CRM Integration',
            jspath: '../dist/smartui-mcp-crm.js',
            icon: 'contact_phone',
            autoStart: true,
            type: 'interaction',
            hideHeader: false,
            params: {
                title: 'MCP-CRM Integration',
                backendUrl: '',   // vuoto = mock data; imposta 'http://localhost:3000' per backend reale
                onClose: () => {
                    iwscore.sendCustomEvent('ConnectorInteractionRemoved', { interactionDeleted: msg.InteractionID });
                    document.getElementById('pureFrame')?.focus();
                    simLog('View chiusa per interazione ' + msg.InteractionID, 'warn');
                },
                onOpen: () => new Promise(resolve => {
                    setTimeout(() => { simLog('onOpen callback fired', 'api'); resolve(true); }, 300);
                })
            },
            ctiMessage: msg
        };
        window.dispatchEvent(new CustomEvent(enumCustomEventType.ConnectorLocalViewAdded, { detail: obj }));
        simLog(`ConnectorLocalViewAdded → ID:${msg.InteractionID.substring(0,8)}... [${msg.MediaType}]`, 'suc');
    }

    function simEvent(key) {
        const msg = EVENTS[key];
        if (!msg) return;
        simLog(`→ Simulazione: ${msg.EVENT} | ${msg.MediaType} | ${msg.ANI || msg.attachdata?.email || ''}`, 'info');
        addView(msg);
    }

    function simEnd() {
        if (!lastId) { simLog('Nessuna interazione attiva', 'warn'); return; }
        const msg = { ...EVENTS.end, InteractionID: lastId };
        iwscore.sendCustomEvent('ConnectorInteractionRemoved', { interactionDeleted: lastId });
        simLog(`MarkDone → ID:${lastId.substring(0,8)}...`, 'info');
        lastId = null;
    }

    function simLog(msg, type = 'suc') {
        const area = document.getElementById('logArea');
        const el = document.createElement('div');
        el.className = 'log-entry ' + type;
        el.textContent = `[${new Date().toLocaleTimeString('it-IT')}] ${msg}`;
        area.appendChild(el);
        area.scrollTop = area.scrollHeight;
    }

    // ── PEF hooks ────────────────────────────────────────────────
    function onPreActivatePureEmbeddableSessionFullPEF(message) {
        if (message.token) {
            iwscore.getConnectorConfig().auth.token = message.token;
            localStorage.setItem('pureCloudToken', message.token);
            pClient = new PureClientSdk(undefined);
            pClient.client.setEnvironment(GENESYS_ENV);
            pClient.client.setAccessToken(message.token);
        }
    }

    function onPreRequestConfigurationPureEmbeddable(message) {
        if (iwscore.getConnectorConfig().integrationType === 'pure-embeddable') {
            iwscore.sendPureEmbeddableConfiguration();
        }
    }

    async function onActivatePureEmbeddableSessionFullPEF(message) {
        simLog('Agente autenticato su Genesys Cloud ✓', 'suc');
    }

    // Handler per gli eventi PEF — ognuno aggiunge la view MCP-CRM
    function onEventEstablishedInbound(msg)              { addView(msg); }
    function onEventEstablishedOutbound(msg)             { addView(msg); }
    function onEmailEventEstablishedInbound(msg)         { addView(msg); }
    function onWebmessagingEventEstablishedInbound(msg)  { addView(msg); }
    function onSMSEventEstablishedInbound(msg)           { addView(msg); }
    function onWhatsappEventEstablishedInbound(msg)      { addView(msg); }

    // ── Init ─────────────────────────────────────────────────────
    $(document).ready(function () {
        simLog('Inizializzazione PEF...', 'info');
        iwscore.initCTI(config);
        iwscore.enableCTI();
    });
</script>
</body>
</html>
